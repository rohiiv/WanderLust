<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up — Wanderlust</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    :root{--deep:#05111f;--mid:#0b1e35;--blue:#133a5e;--accent:#2176ae;--wave:#4facde;--foam:#9dd4f0;--gold:#e8b84b;--white:#eef7ff;--error:#e05c7a;--success:#3dbfa8}
    body{font-family:'Outfit',sans-serif;background:var(--deep);color:var(--white);min-height:100vh;display:flex}
    #root{display:flex;width:100%;min-height:100vh}

    /* Left panel */
    .left{flex:1;background:linear-gradient(145deg,var(--mid) 0%,var(--blue) 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:3rem;position:relative;overflow:hidden}
    .left::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 40% 50%,rgba(79,172,222,.15),transparent 60%)}
    .panel-globe{position:relative;z-index:1;margin-bottom:2.5rem;animation:float 6s ease-in-out infinite}
    @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
    .panel-text{position:relative;z-index:1;text-align:center}
    .panel-text h2{font-family:'Cormorant Garamond',serif;font-size:2rem;margin-bottom:.7rem;font-weight:600}
    .panel-text h2 em{color:var(--wave);font-style:italic}
    .panel-text p{color:rgba(157,212,240,.6);font-weight:300;line-height:1.7;max-width:300px}
    .perks{margin-top:2.5rem;display:flex;flex-direction:column;gap:.9rem}
    .perk{display:flex;align-items:center;gap:.8rem}
    .perk-ic{width:36px;height:36px;background:rgba(79,172,222,.12);border:1px solid rgba(79,172,222,.22);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0}
    .perk p{font-size:.83rem;color:rgba(157,212,240,.65);font-weight:300}

    /* Right / form */
    .right{width:480px;background:var(--deep);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:3rem 2.5rem;overflow-y:auto}
    .form-wrap{width:100%;max-width:380px}
    .back{display:inline-flex;align-items:center;gap:.4rem;color:rgba(157,212,240,.4);font-size:.83rem;text-decoration:none;margin-bottom:2.2rem;transition:color .2s}
    .back:hover{color:var(--wave)}
    .fh h1{font-family:'Cormorant Garamond',serif;font-size:2.3rem;margin-bottom:.3rem;font-weight:600}
    .fh h1 em{color:var(--wave);font-style:italic}
    .fh p{color:rgba(157,212,240,.45);font-size:.88rem;font-weight:300;margin-bottom:2rem}

    /* Field */
    .field{margin-bottom:1.1rem}
    .field label{display:block;font-size:.73rem;text-transform:uppercase;letter-spacing:.09em;color:rgba(157,212,240,.55);margin-bottom:.45rem;font-weight:500}
    .inp-wrap{position:relative}
    .inp-icon{position:absolute;left:.9rem;top:50%;transform:translateY(-50%);font-size:.95rem;pointer-events:none;color:rgba(79,172,222,.35)}
    input[type=text],input[type=email],input[type=password]{width:100%;background:rgba(19,58,94,.22);border:1.5px solid rgba(79,172,222,.12);border-radius:11px;padding:.82rem .9rem .82rem 2.7rem;color:var(--white);font-family:'Outfit',sans-serif;font-size:.93rem;outline:none;transition:all .3s}
    input::placeholder{color:rgba(157,212,240,.18)}
    input:focus{border-color:var(--wave);background:rgba(19,58,94,.38);box-shadow:0 0 0 3px rgba(79,172,222,.09)}
    input.err{border-color:var(--error)!important}
    input.ok{border-color:var(--success)!important}
    .err-msg{font-size:.72rem;color:var(--error);margin-top:.35rem;display:flex;align-items:center;gap:.3rem}

    /* Strength */
    .strength{margin-top:.4rem}
    .str-track{height:3px;background:rgba(79,172,222,.08);border-radius:2px;overflow:hidden;margin-bottom:.25rem}
    .str-fill{height:100%;border-radius:2px;transition:all .4s}
    .str-lbl{font-size:.7rem}

    /* Toggle */
    .eye-btn{position:absolute;right:.9rem;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:rgba(79,172,222,.35);font-size:.95rem;transition:color .2s}
    .eye-btn:hover{color:var(--wave)}

    /* Terms */
    .terms-row{display:flex;align-items:flex-start;gap:.65rem;margin-bottom:1.4rem}
    .terms-row input[type=checkbox]{width:17px;height:17px;padding:0;accent-color:var(--wave);flex-shrink:0;margin-top:2px}
    .terms-row label{font-size:.78rem;color:rgba(157,212,240,.5);line-height:1.55;font-weight:300}
    .terms-row label a{color:var(--wave);text-decoration:none}

    /* Submit */
    .submit-btn{width:100%;padding:.95rem;background:linear-gradient(135deg,var(--accent),var(--wave));color:var(--deep);border:none;border-radius:11px;font-family:'Outfit',sans-serif;font-size:.95rem;font-weight:600;cursor:pointer;transition:all .3s;box-shadow:0 4px 18px rgba(33,118,174,.35)}
    .submit-btn:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(33,118,174,.5)}
    .submit-btn:disabled{opacity:.6;pointer-events:none}

    .switch-link{text-align:center;margin-top:1.4rem;font-size:.85rem;color:rgba(157,212,240,.4)}
    .switch-link a{color:var(--wave);text-decoration:none;font-weight:500}
    .switch-link a:hover{text-decoration:underline}

    /* Success overlay */
    .success-ov{position:fixed;inset:0;background:rgba(5,17,31,.96);z-index:999;display:flex;align-items:center;justify-content:center;flex-direction:column;text-align:center;animation:fadeIn .5s ease}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    .success-ov .s-icon{font-size:4rem;margin-bottom:1rem;animation:pop .6s .2s ease both}
    @keyframes pop{from{transform:scale(0)}to{transform:scale(1)}}
    .success-ov h2{font-family:'Cormorant Garamond',serif;font-size:2.2rem;margin-bottom:.5rem}
    .success-ov h2 em{color:var(--wave);font-style:italic}
    .success-ov p{color:rgba(157,212,240,.55);margin-bottom:2rem;font-weight:300}
    .go-btn{padding:.9rem 2.2rem;background:linear-gradient(135deg,var(--accent),var(--wave));color:var(--deep);border-radius:50px;text-decoration:none;font-weight:600;font-family:'Outfit',sans-serif}

    @media(max-width:860px){.left{display:none}.right{width:100%}}
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useCallback, useRef, useEffect } = React;

// ═══════════════════════════════════════════════════════════
// ADVANCED JS #1: Constructor Function — User model
// ═══════════════════════════════════════════════════════════
function User(name, email, password) {
  this.id       = 'user_' + Date.now();
  this.name     = name;
  this.email    = email;
  this.password = password;
  this.createdAt = new Date().toISOString();
  this.destinations = [];
}
// Prototype method
User.prototype.getInitials = function() {
  return this.name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0,2);
};
User.prototype.toJSON = function() {
  return JSON.stringify({
    id: this.id, name: this.name, email: this.email,
    createdAt: this.createdAt, destinations: this.destinations
  });
};

// ═══════════════════════════════════════════════════════════
// ADVANCED JS #2: Closure — Validator factory
// ═══════════════════════════════════════════════════════════
const createValidator = (function() {
  // Private regex patterns — encapsulated via closure
  const patterns = {
    email:    /^[^\s@]+@[^\s@]+\.[^\s@]+$/,
    name:     /^[a-zA-Z]+(?: [a-zA-Z]+)+$/,
    password: /^.{8,}$/
  };
  const messages = {
    email:    'Enter a valid email address',
    name:     'Enter your full name (first & last)',
    password: 'Minimum 8 characters required'
  };
  return function(field) {
    return {
      validate: (value) => patterns[field]?.test(value.trim()) ?? value.trim().length > 0,
      message:  messages[field] ?? 'This field is required'
    };
  };
})();

// ═══════════════════════════════════════════════════════════
// ADVANCED JS #3: Closure — Password strength analyser
// ═══════════════════════════════════════════════════════════
const analyseStrength = (function() {
  const levels = [
    { label: 'Too short',     color: '#e05c7a', width: '12%'  },
    { label: 'Weak',          color: '#e8874b', width: '30%'  },
    { label: 'Fair',          color: '#e8b84b', width: '58%'  },
    { label: 'Strong',        color: '#3dbfa8', width: '82%'  },
    { label: 'Very Strong 💪',color: '#4facde', width: '100%' }
  ];
  const checks = [
    p => p.length >= 8,
    p => p.length >= 12,
    p => /[A-Z]/.test(p),
    p => /[0-9]/.test(p),
    p => /[^A-Za-z0-9]/.test(p)
  ];
  return (pwd) => {
    if (!pwd) return null;
    const score = checks.reduce((s, fn) => s + (fn(pwd) ? 1 : 0), 0);
    return levels[Math.min(score, 4)];
  };
})();

// ═══════════════════════════════════════════════════════════
// REACT COMPONENT: InputField (with useCallback hook)
// ═══════════════════════════════════════════════════════════
function InputField({ label, id, type = 'text', placeholder, value, onChange, icon, error, valid }) {
  const [show, setShow] = useState(false);
  const isPwd = type === 'password';
  const inputType = isPwd ? (show ? 'text' : 'password') : type;

  return (
    <div className="field">
      <label htmlFor={id}>{label}</label>
      <div className="inp-wrap">
        <span className="inp-icon">{icon}</span>
        <input
          id={id} type={inputType} placeholder={placeholder}
          value={value} onChange={e => onChange(e.target.value)}
          className={error ? 'err' : valid ? 'ok' : ''}
          autoComplete={isPwd ? 'new-password' : id}
        />
        {isPwd && (
          <button type="button" className="eye-btn" onClick={() => setShow(s => !s)}>
            {show ? '🙈' : '👁'}
          </button>
        )}
      </div>
      {error && <div className="err-msg">⚠ {error}</div>}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
// REACT COMPONENT: StrengthMeter
// ═══════════════════════════════════════════════════════════
function StrengthMeter({ password }) {
  const result = analyseStrength(password);
  if (!password) return null;
  return (
    <div className="strength">
      <div className="str-track">
        <div className="str-fill" style={{ width: result.width, background: result.color }}/>
      </div>
      <div className="str-lbl" style={{ color: result.color }}>{result.label}</div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
// MAIN SIGNUP COMPONENT — uses useState, useEffect, useCallback, useRef
// ═══════════════════════════════════════════════════════════
function SignupPage() {
  // useState hooks for each field
  const [name,    setName]    = useState('');
  const [email,   setEmail]   = useState('');
  const [pwd,     setPwd]     = useState('');
  const [confirm, setConfirm] = useState('');
  const [terms,   setTerms]   = useState(false);
  const [errors,  setErrors]  = useState({});
  const [loading, setLoading] = useState(false);
  const [success, setSuccess] = useState(false);

  // useRef — track if form was submitted (advanced usage)
  const submitted = useRef(false);

  // useEffect — validate on change after first submit
  useEffect(() => {
    if (submitted.current) validateAll(false);
  }, [name, email, pwd, confirm]);

  // useCallback — memoised validation to avoid re-creation
  const validateAll = useCallback((final = true) => {
    const nameV    = createValidator('name');
    const emailV   = createValidator('email');
    const passwordV = createValidator('password');
    const newErrs = {};
    if (!nameV.validate(name))       newErrs.name    = nameV.message;
    if (!emailV.validate(email))     newErrs.email   = emailV.message;
    if (!passwordV.validate(pwd))    newErrs.pwd     = passwordV.message;
    if (pwd !== confirm)             newErrs.confirm = 'Passwords do not match';
    if (final && !terms)             newErrs.terms   = 'Please accept the terms';
    setErrors(newErrs);
    return Object.keys(newErrs).length === 0;
  }, [name, email, pwd, confirm, terms]);

  // ═══════════════════════════════════════════════════════
  // ADVANCED JS #4: Default parameters in handleSubmit
  // ═══════════════════════════════════════════════════════
  const handleSubmit = async (e, delay = 1200) => {
    e.preventDefault();
    submitted.current = true;
    if (!validateAll()) return;
    setLoading(true);

    await new Promise(res => setTimeout(res, delay));

    // Check existing users
    const users = JSON.parse(localStorage.getItem('wl_users') || '[]');
    if (users.find(u => u.email === email)) {
      setErrors({ email: 'An account with this email already exists' });
      setLoading(false);
      return;
    }

    // ADVANCED JS #1 in action: instantiate User with constructor
    const newUser = new User(name.trim(), email.trim(), pwd);
    users.push(newUser);
    localStorage.setItem('wl_users', JSON.stringify(users));

    // Store session — save minimal info (not password)
    localStorage.setItem('wl_session', JSON.stringify({
      id: newUser.id, name: newUser.name, email: newUser.email
    }));

    setLoading(false);
    setSuccess(true);
  };

  // Derived state for valid fields (for green border)
  const valid = {
    name:    !errors.name    && name    && submitted.current,
    email:   !errors.email   && email   && submitted.current,
    pwd:     !errors.pwd     && pwd     && submitted.current,
    confirm: !errors.confirm && confirm && submitted.current,
  };

  if (success) return (
    <div className="success-ov">
      <div className="s-icon">🎉</div>
      <h2>Welcome to <em>Wanderlust!</em></h2>
      <p>Your account is ready. Let's start mapping your dreams.</p>
      <a href="app.html" className="go-btn">Open My Map →</a>
    </div>
  );

  return (
    <div id="root" style={{display:'flex',width:'100%',minHeight:'100vh'}}>
      {/* Left decorative panel */}
      <div className="left">
        <div className="panel-globe">
          <svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <radialGradient id="gg" cx="35%" cy="35%">
                <stop offset="0%" stopColor="#2176ae"/>
                <stop offset="100%" stopColor="#05111f"/>
              </radialGradient>
            </defs>
            <circle cx="100" cy="100" r="85" fill="url(#gg)" stroke="#4facde" strokeWidth="1.2" strokeOpacity=".4"/>
            <ellipse cx="100" cy="100" rx="36" ry="85" fill="none" stroke="#4facde" strokeWidth=".9" strokeOpacity=".3"/>
            <ellipse cx="100" cy="100" rx="72" ry="85" fill="none" stroke="#4facde" strokeWidth=".9" strokeOpacity=".18"/>
            <line x1="15" y1="100" x2="185" y2="100" stroke="#4facde" strokeWidth=".9" strokeOpacity=".25"/>
            <line x1="26" y1="65"  x2="174" y2="65"  stroke="#4facde" strokeWidth=".7" strokeOpacity=".18"/>
            <line x1="26" y1="135" x2="174" y2="135" stroke="#4facde" strokeWidth=".7" strokeOpacity=".18"/>
            <path d="M42,72 Q56,66 67,76 Q77,86 72,96 Q62,102 52,92 Z" fill="#133a5e" opacity=".8"/>
            <path d="M108,62 Q138,56 154,76 Q164,96 148,112 Q129,120 114,106 Q100,92 108,62 Z" fill="#133a5e" opacity=".75"/>
            <path d="M109,122 Q130,116 141,133 Q149,150 136,160 Q121,164 109,152 Q98,140 109,122 Z" fill="#133a5e" opacity=".65"/>
            <circle cx="66" cy="83" r="4.5" fill="#e8b84b" opacity=".9"/>
            <circle cx="134" cy="88" r="4" fill="#4facde" opacity=".9"/>
            <circle cx="120" cy="138" r="3.5" fill="#3dbfa8" opacity=".9"/>
          </svg>
        </div>
        <div className="panel-text">
          <h2>Join <em>Wanderlust</em></h2>
          <p>Your personal travel OS. Pin places, track adventures, celebrate every milestone.</p>
          <div className="perks">
            <div className="perk"><div className="perk-ic">🗺️</div><p>Interactive map with SVG markers</p></div>
            <div className="perk"><div className="perk-ic">📍</div><p>Geolocation — find yourself live</p></div>
            <div className="perk"><div className="perk-ic">⚛️</div><p>React-powered, JSON-backed</p></div>
          </div>
        </div>
      </div>

      {/* Right form panel */}
      <div className="right">
        <div className="form-wrap">
          <a href="index.html" className="back">← Back to home</a>
          <div className="fh">
            <h1>Create <em>account</em></h1>
            <p>Start your journey in seconds</p>
          </div>

          <form onSubmit={handleSubmit} noValidate>
            <InputField label="Full Name" id="name" placeholder="Alex Johnson"
              value={name} onChange={setName} icon="👤"
              error={errors.name} valid={valid.name}/>

            <InputField label="Email Address" id="email" type="email" placeholder="alex@example.com"
              value={email} onChange={setEmail} icon="✉️"
              error={errors.email} valid={valid.email}/>

            <InputField label="Password" id="password" type="password" placeholder="Min. 8 characters"
              value={pwd} onChange={setPwd} icon="🔒"
              error={errors.pwd} valid={valid.pwd}/>
            <StrengthMeter password={pwd}/>

            <div style={{marginTop:'.5rem'}}>
              <InputField label="Confirm Password" id="confirmPassword" type="password" placeholder="Repeat password"
                value={confirm} onChange={setConfirm} icon="🔒"
                error={errors.confirm} valid={valid.confirm}/>
            </div>

            <div className="terms-row" style={{marginTop:'.2rem'}}>
              <input type="checkbox" id="terms" checked={terms} onChange={e => setTerms(e.target.checked)}/>
              <label htmlFor="terms">
                I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>
              </label>
            </div>
            {errors.terms && <div className="err-msg" style={{marginBottom:'.8rem'}}>⚠ {errors.terms}</div>}

            <button type="submit" className="submit-btn" disabled={loading}>
              {loading ? 'Creating account...' : 'Create Account ✈️'}
            </button>
          </form>

          <div className="switch-link">
            Already have an account? <a href="login.html">Login here</a>
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<SignupPage/>);
</script>
</body>
</html>
